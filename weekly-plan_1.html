<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Weekly Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm: #F0EAE0;
    --deep: #2C2416;
    --mid: #6B5E4E;
    --accent: #C4785A;
    --soft: #E8D5C4;
    --early: #4A7C6F;
    --late: #7B5EA7;
    --off: #C4785A;
    --early-bg: #EAF2F0;
    --late-bg: #F0EBF7;
    --off-bg: #FBF0EB;
    --tick: #5A8A60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--deep);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--soft);
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: var(--deep);
    line-height: 1.1;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: var(--mid);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Shift selector */
  .shift-selector {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .shift-btn {
    padding: 0.45rem 1.1rem;
    border-radius: 2rem;
    border: 1.5px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .shift-btn.early { background: var(--early-bg); color: var(--early); border-color: var(--early); }
  .shift-btn.late  { background: var(--late-bg);  color: var(--late);  border-color: var(--late);  }
  .shift-btn.off   { background: var(--off-bg);   color: var(--off);   border-color: var(--off);   }

  .shift-btn:not(.active) { opacity: 0.4; }
  .shift-btn.active { opacity: 1; }

  /* Day cards */
  .days-grid {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .day-card {
    border-radius: 14px;
    padding: 1.1rem 1.3rem;
    transition: box-shadow 0.2s;
  }

  .day-card.early { background: var(--early-bg); border-left: 4px solid var(--early); }
  .day-card.late  { background: var(--late-bg);  border-left: 4px solid var(--late); }
  .day-card.off   { background: var(--off-bg);   border-left: 4px solid var(--off); }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
  }

  .day-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
  }

  .day-card.early .day-name { color: var(--early); }
  .day-card.late  .day-name { color: var(--late); }
  .day-card.off   .day-name { color: var(--off); }

  .shift-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.2rem 0.65rem;
    border-radius: 1rem;
  }

  .day-card.early .shift-label { background: var(--early); color: white; }
  .day-card.late  .shift-label { background: var(--late);  color: white; }
  .day-card.off   .shift-label { background: var(--off);   color: white; }

  /* Tasks */
  .tasks { display: flex; flex-direction: column; gap: 0.45rem; }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    cursor: pointer;
    user-select: none;
    padding: 0.35rem 0.4rem;
    border-radius: 8px;
    transition: background 0.15s;
  }

  .task:hover { background: rgba(0,0,0,0.04); }

  .task input[type="checkbox"] { display: none; }

  .check-box {
    width: 18px;
    height: 18px;
    min-width: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--mid);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.18s;
    background: white;
  }

  .task.done .check-box {
    background: var(--tick);
    border-color: var(--tick);
  }

  .check-box svg { display: none; }
  .task.done .check-box svg { display: block; }

  .task-text {
    font-size: 0.88rem;
    line-height: 1.4;
    color: var(--deep);
    transition: opacity 0.18s;
  }

  .task.done .task-text {
    opacity: 0.45;
    text-decoration: line-through;
  }

  .task-note {
    font-size: 0.75rem;
    color: var(--mid);
    margin-top: 0.15rem;
  }

  /* Weekly check-in */
  .checkin {
    margin-top: 2rem;
    background: var(--warm);
    border-radius: 14px;
    padding: 1.3rem 1.4rem;
    border: 1px solid var(--soft);
  }

  .checkin h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    margin-bottom: 0.3rem;
  }

  .checkin p {
    font-size: 0.82rem;
    color: var(--mid);
    margin-bottom: 1rem;
  }

  .checkin-q {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
    cursor: pointer;
    font-size: 0.88rem;
    padding: 0.3rem 0.4rem;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .checkin-q:hover { background: rgba(0,0,0,0.04); }
  .checkin-q input { display: none; }
  .checkin-q .check-box { min-width: 18px; }
  .checkin-q.done .check-box { background: var(--accent); border-color: var(--accent); }
  .checkin-q.done .task-text { opacity: 0.5; text-decoration: line-through; }

  /* Reset */
  .reset-row {
    text-align: center;
    margin-top: 2rem;
  }

  .reset-btn {
    background: none;
    border: 1.5px solid var(--soft);
    border-radius: 2rem;
    color: var(--mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.4rem 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-top: 1rem;
    font-size: 0.78rem;
    color: var(--mid);
  }

  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--soft);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: var(--mid);
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>My Weekly <em>Wellness</em> Plan</h1>
    <p class="subtitle">Shift-aware · Simple · Forgiving</p>
  </header>

  <div class="shift-selector">
    <button class="shift-btn early active" onclick="filterShift('all')">All Days</button>
    <button class="shift-btn early" onclick="filterShift('early')">🌅 Early Shifts</button>
    <button class="shift-btn late"  onclick="filterShift('late')">🌆 Late Shifts</button>
    <button class="shift-btn off"   onclick="filterShift('off')">☀️ Days Off</button>
  </div>

  <div class="days-grid" id="days">

    <!-- EARLY DAYS -->
    <div class="day-card early" data-type="early">
      <div class="day-header">
        <span class="day-name">Early Shift Day</span>
        <span class="shift-label">🌅 0500 start</span>
      </div>
      <div class="tasks">
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Prep food the night before — don't rely on willpower at 4am</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Eat breakfast before or just after starting — don't skip it</div><div class="task-note">Protein + complex carb. Eggs, yoghurt, oats.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Use the plate method at your main meal today</div><div class="task-note">½ veg, ¼ protein, ¼ complex carbs. No weighing needed.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Protect your sleep window after this shift</div><div class="task-note">Phone down, curtains closed. Sleep is part of the plan.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">10 min gentle movement if energy allows — walk is enough</div></span></label>
      </div>
    </div>

    <!-- LATE DAYS -->
    <div class="day-card late" data-type="late">
      <div class="day-header">
        <span class="day-name">Late Shift Day</span>
        <span class="shift-label">🌆 1200–2200</span>
      </div>
      <div class="tasks">
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Use your morning — eat a proper breakfast before heading in</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">20-min morning movement before your shift</div><div class="task-note">Best window you have. Bodyweight squats, a brisk walk, anything.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Plate method at lunch/main meal</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">If finishing at 2200 — keep the post-shift meal light</div><div class="task-note">Soup, eggs, small leftovers. Not a full dinner late at night.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">No high-sugar snacks to push through the afternoon slump</div><div class="task-note">Try water + a handful of nuts instead.</div></span></label>
      </div>
    </div>

    <!-- DAYS OFF -->
    <div class="day-card off" data-type="off">
      <div class="day-header">
        <span class="day-name">Day Off</span>
        <span class="shift-label">☀️ Rest & reset</span>
      </div>
      <div class="tasks">
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Do your main workout today — aim for 30–40 min</div><div class="task-note">Aerobic + at least one resistance block (squats, lunges, push-ups).</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Batch cook or prep for the upcoming shift block</div><div class="task-note">Boiled eggs, cut veg, grain salad, portioned snacks.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">3 regular meals using the plate method</div><div class="task-note">Days off are when you build the rhythm.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Do your waist measurement (once a fortnight on a day off)</div><div class="task-note">First thing in the morning, same spot each time.</div></span></label>
        <label class="task"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><div class="task-text">Take 5 minutes for your weekly check-in (see below)</div></span></label>
      </div>
    </div>

  </div>

  <!-- WEEKLY CHECK-IN -->
  <div class="checkin">
    <h2>Weekly Check-in</h2>
    <p>Do this once on a day off. No scores, no guilt — just noticing.</p>
    <label class="checkin-q"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="task-text">Did I eat roughly to the plan most days this cycle?</span></label>
    <label class="checkin-q"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="task-text">Did I move at least twice this cycle?</span></label>
    <label class="checkin-q"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="task-text">Did I protect my sleep most days?</span></label>
    <label class="checkin-q"><input type="checkbox"><span class="check-box"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="task-text">Did I do my batch prep before the early block started?</span></label>
    <div class="progress-row">
      <span id="progress-label">0 of 4</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </div>

  <div class="reset-row">
    <button class="reset-btn" onclick="resetAll()">↺ Reset all ticks for new cycle</button>
  </div>

  <footer>Built around your 3 early · 3 late · 3 off rotation</footer>

</div>

<script>
  // Checkbox toggle
  document.querySelectorAll('.task, .checkin-q').forEach(item => {
    item.addEventListener('click', function() {
      this.classList.toggle('done');
      updateProgress();
    });
  });

  function updateProgress() {
    const qs = document.querySelectorAll('.checkin-q');
    const done = Array.from(qs).filter(q => q.classList.contains('done')).length;
    document.getElementById('progress-label').textContent = done + ' of ' + qs.length;
    document.getElementById('progress-fill').style.width = (done / qs.length * 100) + '%';
  }

  function filterShift(type) {
    const cards = document.querySelectorAll('.day-card');
    cards.forEach(card => {
      card.style.display = (type === 'all' || card.dataset.type === type) ? 'block' : 'none';
    });
    document.querySelectorAll('.shift-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
  }

  function resetAll() {
    document.querySelectorAll('.task, .checkin-q').forEach(item => item.classList.remove('done'));
    updateProgress();
  }
</script>
</body>
</html>
